site_name: SAT
theme:
  name: material
  custom_dir: ./overrides/
  logo: docs_assets/images/AHORA.svg
  favicon: docs_assets/images/AHORA.svg
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: darkmode
      toggle:
        icon: octicons/sun-16
        name: Switch to light mode
  language: es
  features:
    - navigation.path
    - navigation.expand
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
use_directory_urls: true
nav:
  - Inicio: index.md
  - FAQ (SAT):
      - Cómo instalar el SAT de Flexygo: SAT by flexygo/FAQ (SAT)/Como instalar el SAT de Flexygo.md
      - Pasos a seguir tras la instalación de SAT by flexygo: SAT by flexygo/FAQ (SAT)/Pasos a seguir tras la instalación de SAT by flexygo.md
      - Compatibilidad del producto Sat by Flexygo con el ERP de Ahora: SAT by flexygo/FAQ (SAT)/Compatibilidad del producto Sat by Flexygo con el ERP de Ahora.md
      - Nivel de compatibilidad de la base de datos: SAT by flexygo/FAQ (SAT)/Nivel de compatibilidad de la base de datos.md
      - AHORA SAT - App Web - Configuración: SAT by flexygo/FAQ (SAT)/AHORA SAT - App Web - Configuración.md
      - AHORA SAT - App Web - Entorno: SAT by flexygo/FAQ (SAT)/AHORA SAT - App Web - Entorno.md
      - AHORA SAT - App Web - Funcionalidad: SAT by flexygo/FAQ (SAT)/AHORA SAT - App Web - Funcionalidad.md
      - AHORA SAT - App móvil - Instalación y entorno: SAT by flexygo/FAQ (SAT)/AHORA SAT - App móvil - Instalación y entorno.md
      - AHORA SAT - App móvil - Alcance funcional: SAT by flexygo/FAQ (SAT)/AHORA SAT - App móvil - Alcance funcional.md
      - AHORA SAT - App móvil - Clientes: SAT by flexygo/FAQ (SAT)/AHORA SAT - App móvil - Clientes.md
      - AHORA SAT - App móvil - Partes: SAT by flexygo/FAQ (SAT)/AHORA SAT - App móvil - Partes.md
      - Acceso a la base de datos Flexygo App Offline: SAT by flexygo/FAQ (SAT)/Acceso a la base de datos Flexygo App Offline.md
      - Depurar error en sincronización en Sat: SAT by flexygo/FAQ (SAT)/Depurar error en sincronización en Sat.md
extra:
  version:
    provider: mike
extra_css:
  # Basic styles for every documentation project
  ## Basic Structure
  - stylesheets/custom-colors.css
  - stylesheets/fh-structural/base.css
  - stylesheets/fh-structural/code-highlighting.css
  - stylesheets/fh-structural/css-class-components.css
  - stylesheets/fh-structural/404-error.css
  ## Basic components
  - stylesheets/fh-structural/components/fh-modal.css
  - stylesheets/fh-structural/components/fh-copy.css
  - stylesheets/fh-structural/components/fh-namepropagator.css
  - stylesheets/fh-structural/components/fh-versions.css
  ## Basic fonts and icons
  - docs_assets/fh-structural/fonts/flags/flags.css
  - docs_assets/fh-structural/fonts/flexygo/utils.css
  - docs_assets/fh-structural/fonts/flexygo/flexygo-icons.css

  # Your project styles files here ↓

extra_javascript:
  # Basic javascripts for every documentation project
  ## Basic utilities
  - javascripts/fh-structural/utils.js
  ## Basic components
  - javascripts/fh-structural/components/fh-modal.js
  - javascripts/fh-structural/components/fh-copy.js
  - javascripts/fh-structural/components/fh-popover.js
  - javascripts/fh-structural/components/fh-namepropagator.js
  - javascripts/fh-structural/components/flx-navbutton.js
  - javascripts/fh-structural/components/fh-versions.js
  ## Translation files
  - javascripts/cultures/default_language.js
  - javascripts/cultures/es.js
  - javascripts/cultures/en.js

  # Your project js files here ↓

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 3
  - tables
  - admonition
  - footnotes
  - abbr  # Abreviaciones con tooltips
  - def_list  # Listas de definición
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tilde
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.keys  # Marcado de teclado (++ctrl+c++)
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.details  # Admonitions colapsables
  - attr_list
  - md_in_html
plugins:
  - search
  - i18n:
      default_language: es
      languages:
        es:
          name: Español
          build: true
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: zoom
      width: 100%
      height: auto
      zoomable: true
      draggable: false
      skip_classes:
        - not-zoomable
        - fh-image-of-title
